services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # painel web: http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db   # persiste os dados mesmo se o container reiniciar

  api:
    build: ./api
    container_name: api
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongodb:27017   # "mongodb" é o nome do service acima
      DB_NAME: pedidos_db
    depends_on:
      - mongodb                            # sobe o mongo antes da api

volumes:
  mongo_data: